<!DOCTYPE html>
<html lang="en">
    <head>
        <html xmlns="http://www.w3.org/1999/xhtml"></html>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

        <link rel="stylesheet" href ="css/index.css">
        <title>Image.io - Home</title>
    </head>
    <body>
        <div class="home">
            <div class="section-image">
                <nav class="navbar navbar-light bg-dark ">
                    <div class="container container-fluid ">
                        <a class="navbar-brand mx-auto" href="#">
                            <img src="logo.png" alt="" width="40" height="30" class="d-inline-block align-middle">
                            <span>Image.IO</span>
                        </a>
                    </div>
                </nav>
                <div id="wrapper-home">
                    <div class="image-uploader">
                        <div class="container">
                            <div class="row g-4 align-items-center">
                                <div class="col-12 col-md-6 order-1 order-md-2">
                                    <div id="lottie"></div>
                                </div>
                                <div class="col-12 col-md-6 order-2 order-md-1">
                                    <div class="caption">
                                        <p class="mainText">An easy way to work with images</p>
                                        <p class="tagLine">Customize your images with <code>Image.IO</code></p>
                                    </div>
                                    <form action="" class="image-upload">
                                        <label for="file" class="import" id="drop_zone" ondrop="dropHandler(event);" ondragover="dragOverHandler(event);">
                                            <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
                                            <lottie-player src="https://assets8.lottiefiles.com/packages/lf20_h27x2otl.json"  background="transparent"  speed="1"  style="height: 21vh;"  loop  autoplay></lottie-player>
                                            <p>Drag'n drop your images or click to upload</p>
                                        </label>
                                        <input type="file" id="file" name="file">
                                    </form>
                                </div>
                              </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.4.3/lottie.min.js"></script>
        <script type="text/javascript" src="js/Blogging.json"></script>
        <script>
            var params = {
                container: document.getElementById('lottie'),
                renderer: 'svg',
                loop: true,
                autoplay: true,
                animationData: animationData
            };

            var anim;

            anim = lottie.loadAnimation(params);

        </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
    </body>
</html>
